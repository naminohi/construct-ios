name: iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  UNIFFI_VERSION: "0.30.0"

jobs:
  # ── 1. Build xcframework + check Swift bindings drift ────────────────────
  build-ios:
    name: Build xcframework + UDL drift check
    runs-on: macos-14
    steps:
      # Checkout siblings in the layout expected by build_crypto_lib.sh:
      # $GITHUB_WORKSPACE/construct-ice/
      # $GITHUB_WORKSPACE/construct-core/   ← build_crypto_lib.sh uses PROJECT_ROOT/../construct-core
      # $GITHUB_WORKSPACE/construct-messenger/  ← PROJECT_ROOT

      - name: Checkout construct-ice
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/construct-ice
          path: construct-ice

      - name: Checkout construct-core
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/construct-core
          path: construct-core

      - name: Checkout construct-messenger
        uses: actions/checkout@v4
        with:
          path: construct-messenger

      - name: Install Rust (stable + iOS targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim,aarch64-apple-ios,x86_64-apple-ios

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            construct-core/target/
          key: macos-cargo-ios-${{ hashFiles('construct-core/Cargo.lock', 'construct-ice/Cargo.lock') }}
          restore-keys: macos-cargo-ios-

      - name: Install uniffi-bindgen-cli v${{ env.UNIFFI_VERSION }}
        run: |
          cargo install uniffi-bindgen-cli \
            --version ${{ env.UNIFFI_VERSION }} \
            --locked \
            --quiet

      # build_crypto_lib.sh uses PROJECT_ROOT/../construct-core.
      # PROJECT_ROOT = construct-messenger/, so ../construct-core = construct-core/ ✓
      - name: Build xcframework (simulator)
        working-directory: construct-messenger
        run: bash build_crypto_lib.sh --sim

      - name: Generate Swift bindings
        working-directory: construct-messenger
        run: bash generate_swift_bindings.sh

      # UDL drift gate: fail if construct_core.swift changed after regeneration.
      # This means Rust API was updated without regenerating the Swift bindings.
      - name: Check Swift bindings are up to date
        working-directory: construct-messenger
        run: |
          if ! git diff --quiet ConstructMessenger/construct_core.swift; then
            echo "❌ construct_core.swift is out of date."
            echo "   Run ./generate_swift_bindings.sh and commit the result."
            git diff ConstructMessenger/construct_core.swift
            exit 1
          fi
          echo "✅ Swift bindings are up to date."

  # ── 2. Xcode build + tests (simulator) ───────────────────────────────────
  xcode-test:
    name: Xcode Build + Tests
    runs-on: macos-14
    needs: build-ios
    steps:
      - name: Checkout construct-ice
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/construct-ice
          path: construct-ice

      - name: Checkout construct-core
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/construct-core
          path: construct-core

      - name: Checkout construct-messenger
        uses: actions/checkout@v4
        with:
          path: construct-messenger

      - name: Install Rust (stable + iOS sim target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            construct-core/target/
          key: macos-cargo-ios-${{ hashFiles('construct-core/Cargo.lock', 'construct-ice/Cargo.lock') }}
          restore-keys: macos-cargo-ios-

      - name: Install uniffi-bindgen-cli v${{ env.UNIFFI_VERSION }}
        run: |
          cargo install uniffi-bindgen-cli \
            --version ${{ env.UNIFFI_VERSION }} \
            --locked \
            --quiet

      - name: Build xcframework (simulator)
        working-directory: construct-messenger
        run: bash build_crypto_lib.sh --sim

      - name: Generate Swift bindings
        working-directory: construct-messenger
        run: bash generate_swift_bindings.sh

      - name: Xcode build (no code signing)
        working-directory: construct-messenger
        run: |
          xcodebuild build \
            -scheme ConstructMessenger \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty || cat /dev/stdin

      - name: Xcode test (no code signing)
        working-directory: construct-messenger
        run: |
          xcodebuild test \
            -scheme ConstructMessenger \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty || cat /dev/stdin
